<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Перехват управления</title>
    <style>
        /* --- Стили интерфейса --- */
        :root {
            --font-sans: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
            --transition-speed: 0.25s;
        }

        body {
            font-family: var(--font-sans);
            margin: 0;
            padding: 0;
            transition: background-color var(--transition-speed), color var(--transition-speed);
            -webkit-font-smoothing: antialiased;
        }

        /* Цветовые темы оформления */
        body.theme-light { background-color: #fcfbf9; color: #202020; }
        body.theme-sepia { background-color: #f4ecd8; color: #5b4636; }
        body.theme-dark  { background-color: #121212; color: #dddddd; }

        /* Контейнер адаптирован под фиксированную панель */
        .container {
            max-width: 680px;
            margin: 0 auto;
            padding: 80px 20px 20px 20px;
            box-sizing: border-box;
        }

        /* Навигационная панель с поддержкой плавного скрытия */
        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background-color: inherit;
            border-bottom: 1px solid rgba(128, 128, 128, 0.15);
            backdrop-filter: blur(8px);
            z-index: 1000;
            transition: transform 0.3s ease; /* Плавное скрытие/появление */
        }

        .btn-group button {
            padding: 6px 12px;
            margin: 0 2px;
            cursor: pointer;
            border: 1px solid rgba(128, 128, 128, 0.3);
            border-radius: 6px;
            background-color: rgba(128, 128, 128, 0.1);
            color: inherit;
            font-size: 14px;
            font-weight: bold;
            transition: opacity 0.2s;
        }
        .btn-group button:hover { opacity: 0.8; }

        /* Экраны */
        .screen { display: none; }
        .screen.active { display: block; }

        /* Оглавление */
        h1 { font-size: 26px; text-align: center; margin-top: 10px; }
        .subtitle { text-align: center; color: gray; margin-bottom: 30px; font-size: 16px;}

        .continue-reading-box {
            background-color: rgba(0, 102, 204, 0.1);
            border: 1px solid rgba(0, 102, 204, 0.2);
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 20px;
            display: none;
        }
        .btn-link {
            color: #0066cc;
            text-decoration: underline;
            cursor: pointer;
            font-weight: bold;
            background: none;
            border: none;
            font-size: 15px;
        }

        .chapter-list {
            list-style: none;
            padding: 0;
            margin: 0 0 40px 0;
        }
        .chapter-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 10px;
            border-bottom: 1px solid rgba(128, 128, 128, 0.15);
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .chapter-item:hover { background-color: rgba(128, 128, 128, 0.05); }
        .chapter-info { display: flex; align-items: center; gap: 15px; }
        .chapter-num {
            font-weight: bold;
            min-width: 24px;
            height: 24px;
            background: rgba(128, 128, 128, 0.15);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
        }
        .chapter-title { font-size: 17px; line-height: 1.3; }
        .chapter-status { font-size: 14px; }
        .status-completed { color: #2ecc71; font-weight: bold; }
        .status-reading { color: #3498db; font-style: italic; }

        /* Экран чтения */
        .reader-nav {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        .btn-nav {
            background: none;
            border: 1px solid rgba(128, 128, 128, 0.3);
            color: inherit;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        /* --- Стилизация контента, скачанного из Google Docs --- */
        #chapter-content {
            font-size: inherit;
            line-height: 1.6;
        }
        #chapter-content * {
            background-color: transparent !important;
            color: inherit !important;
            font-family: inherit !important;
        }
        #chapter-content img {
            max-width: 100% !important;
            height: auto !important;
            display: block;
            margin: 24px auto;
            border-radius: 8px;
        }
        #chapter-content p {
            margin-bottom: 1.5em;
            text-align: justify;
        }

        /* Подвал чтения */
        .reader-footer {
            display: flex;
            justify-content: space-between;
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid rgba(128, 128, 128, 0.2);
        }
    </style>
</head>
<body class="theme-light">

    <!-- Верхняя панель управления настройками чтения -->
    <div class="top-bar" id="navigation-top-bar">
        <div>
            <!-- Кнопка перехода к списку (значок 🏠 для экономии места) -->
            <button id="btn-to-index" class="btn-nav" style="display:none;" onclick="goHome()">🏠</button>
        </div>
        <div>
            <span class="btn-group">
                <button onclick="changeFontSize(-1)">А-</button>
                <button onclick="changeFontSize(1)">А+</button>
            </span>
            <span class="btn-group" style="margin-left: 5px;">
                <button onclick="setTheme('light')">День</button>
                <button onclick="setTheme('sepia')">Сепия</button>
                <button onclick="setTheme('dark')">Ночь</button>
            </span>
        </div>
    </div>

    <div class="container">

        <!-- ================= ЭКРАН 1: ОГЛАВЛЕНИЕ ================= -->
        <div id="home-screen" class="screen active">
            <h1>Перехват управления</h1>
            <p class="subtitle">Пошаговый нейро-протокол работы с тягой: как переждать импульс и вернуть контроль над телом</p>

            <!-- Блок быстрого возврата к чтению -->
            <div class="continue-reading-box" id="continue-box">
                Вы остановились на: <button class="btn-link" onclick="resumeReading()"><span id="continue-chapter-title">...</span></button>
            </div>

            <!-- Список глав -->
            <ul class="chapter-list" id="chapters-ul">
                <p style="text-align:center; padding: 20px; opacity:0.7;">Загрузка списка глав...</p>
            </ul>
        </div>

        <!-- ================= ЭКРАН 2: ЧТЕНИЕ ГЛАВЫ ================= -->
        <div id="reading-screen" class="screen">
            <div id="chapter-content" style="font-size: 18px;">
                <!-- Сюда динамически подгружается текст из Google Docs -->
            </div>

            <!-- Переключатели внизу главы -->
            <div class="reader-footer">
                <button id="btn-prev" class="btn-nav" onclick="prevChapter()">← Назад</button>
                <button id="btn-next" class="btn-nav" onclick="nextChapter()">Вперед →</button>
            </div>
        </div>

    </div>

    <script>
        // ================= ССЫЛКА НА ГЛАВНЫЙ ДОКУМЕНТ С ОГЛАВЛЕНИЕМ И ВЕБХУК =================
        const MASTER_DOC_URL = 'https://docs.google.com/document/d/e/2PACX-1vQR7Y7WnZQgXFXdO5D_NTDiwJCJV1G8IJ1VgynuEM55UrpBl33OyVO82roLIHxX9Pdvr_f9lXGCT-5b/pub';
        const AUTO_SYNC_WEBHOOK_URL = 'https://script.google.com/macros/s/AKfycbxNUthMuBoOGOvVLqRODy58_9HCSm7XBdtRGfYi41sguxx_ZbGWb0w7i16MkEXt5AWN/exec'; 

        // Исходная структура глав (заполняется динамически)
        let CHAPTERS_CONFIG = [];

        // Системные переменные
        let patientId = 'Не указан';
        let currentChapterId = null;
        let isTabFocused = true;
        let globalReadingTimeInterval = null;
        let lastScrollY = window.scrollY;

        let trackingStats = {
            totalActiveSeconds: 0,
            lastVisit: new Date().toLocaleDateString('ru-RU'),
            chapters: {}
        };

        // Запуск приложения
        async function initApp() {
            // 1. Определение ID Пациента
            const params = new URLSearchParams(window.location.search);
            const pCode = params.get('p') || params.get('id');
            if (pCode) {
                localStorage.setItem('cravings_p_id', pCode);
                window.history.replaceState({}, document.title, window.location.pathname);
            }
            patientId = localStorage.getItem('cravings_p_id') || 'Не указан';

            // 2. Настройка темы и шрифта
            const savedTheme = localStorage.getItem('cravings_theme') || 'light';
            setTheme(savedTheme);
            const savedFontSize = localStorage.getItem('cravings_font_size') || '18';
            document.getElementById('chapter-content').style.fontSize = savedFontSize + 'px';

            // 3. Загрузка статистики
            const savedStats = localStorage.getItem('cravings_stats_v2');
            if (savedStats) {
                trackingStats = JSON.parse(savedStats);
            }
            trackingStats.lastVisit = new Date().toLocaleDateString('ru-RU');
            saveStatsToStorage();

            // Настройка анимации умного скрытия панели
            initAutoHideNavbar();

            // 4. Динамическое скачивание адресов глав из мастер-документа
            await loadChapterUrlsFromMaster();

            // 5. Запуск таймера активного чтения
            startActiveTimeTracker();
        }

        // Автоматический парсинг главного документа
        async function loadChapterUrlsFromMaster() {
            try {
                const rawHtml = await fetchWithFallback(MASTER_DOC_URL);
                const parser = new DOMParser();
                const doc = parser.parseFromString(rawHtml, 'text/html');
                
                const tempChapters = [];
                const linksAlreadyAdded = new Set();
                let chapterCounter = 1;
                
                doc.querySelectorAll('a').forEach(a => {
                    const href = a.getAttribute('href');
                    if (href) {
                        const clean = extractCleanUrl(href);
                        // Загружаем только ссылки на опубликованные документы Google
                        if (clean.includes('/pub') && clean.includes('docs.google.com/document')) {
                            if (!linksAlreadyAdded.has(clean)) {
                                linksAlreadyAdded.add(clean);
                                
                                const titleText = a.textContent.trim();
                                let title = titleText;
                                let numStr = "";
                                
                                // Проверяем, начинается ли текст ссылки со слова "Глава" или "Введение"
                                const matchChapter = titleText.match(/^Глава\s+(\d+)\.?\s*(.*)$/i);
                                const matchIntro = titleText.match(/^Введение\s*[\.:,-]?\s*(.*)$/i);
                                
                                if (matchChapter) {
                                    numStr = matchChapter[1];
                                    title = matchChapter[2].trim();
                                } else if (matchIntro) {
                                    numStr = "В";
                                    title = "Введение. " + matchIntro[1].trim();
                                } else {
                                    numStr = chapterCounter.toString();
                                    title = titleText;
                                }
                                
                                tempChapters.push({
                                    id: `chapter_${chapterCounter}`,
                                    num: numStr,
                                    title: title,
                                    url: clean
                                });
                                chapterCounter++;
                            }
                        }
                    }
                });

                CHAPTERS_CONFIG = tempChapters;

                if (CHAPTERS_CONFIG.length === 0) {
                    throw new Error('В главном документе не обнаружено подходящих ссылок.');
                }

                // Рендерим оглавление
                renderTableOfContents();
                checkContinueReading();

            } catch (err) {
                console.error('Ошибка импорта структуры оглавления', err);
                document.getElementById('chapters-ul').innerHTML = `
                    <p style="color: red; text-align: center; padding: 20px; font-size:14px;">
                        Ошибка при получении списка глав. Пожалуйста, убедитесь, что главный документ опубликован в вебе, и перезагрузите страницу.
                    </p>`;
            }
        }

        // Очистка редирект-ссылок Google Docs
        function extractCleanUrl(url) {
            if (url.includes('google.com/url?q=')) {
                const parts = url.split('google.com/url?q=');
                if (parts[1]) {
                    const actualUrl = parts[1].split('&')[0];
                    return decodeURIComponent(actualUrl);
                }
            }
            return url;
        }

        // Отрендерить оглавление
        function renderTableOfContents() {
            const ul = document.getElementById('chapters-ul');
            ul.innerHTML = '';
            
            CHAPTERS_CONFIG.forEach(ch => {
                const li = document.createElement('li');
                li.className = 'chapter-item';
                li.onclick = () => openChapter(ch.id);

                const infoDiv = document.createElement('div');
                infoDiv.className = 'chapter-info';

                const numSpan = document.createElement('span');
                numSpan.className = 'chapter-num';
                numSpan.innerText = ch.num;

                const titleSpan = document.createElement('span');
                titleSpan.className = 'chapter-title';
                titleSpan.innerText = ch.title;

                infoDiv.appendChild(numSpan);
                infoDiv.appendChild(titleSpan);
                li.appendChild(infoDiv);

                const statusSpan = document.createElement('span');
                statusSpan.className = 'chapter-status';
                
                const chStats = trackingStats.chapters[ch.id];
                if (chStats && chStats.completed) {
                    statusSpan.innerHTML = '<span class="status-completed">✓ Прочитано</span>';
                } else if (chStats && chStats.timeSeconds > 10) {
                    statusSpan.innerHTML = '<span class="status-reading">В процессе</span>';
                }
                
                li.appendChild(statusSpan);
                ul.appendChild(li);
            });
        }

        // Проверить прерванное чтение
        function checkContinueReading() {
            const lastChId = localStorage.getItem('cravings_last_ch_id');
            if (lastChId) {
                const chapter = CHAPTERS_CONFIG.find(c => c.id === lastChId);
                if (chapter && chapter.url) {
                    document.getElementById('continue-box').style.display = 'block';
                    document.getElementById('continue-chapter-title').innerText = `${chapter.title}`;
                }
            } else {
                document.getElementById('continue-box').style.display = 'none';
            }
        }

        function resumeReading() {
            const lastChId = localStorage.getItem('cravings_last_ch_id');
            if (lastChId) openChapter(lastChId);
        }

        // ================= ОТКРЫТИЕ И ЧТЕНИЕ ГЛАВЫ =================
        async function openChapter(chapterId) {
            currentChapterId = chapterId;
            localStorage.setItem('cravings_last_ch_id', chapterId);
            
            document.getElementById('home-screen').classList.remove('active');
            document.getElementById('reading-screen').classList.add('active');
            document.getElementById('btn-to-index').style.display = 'block';

            const index = CHAPTERS_CONFIG.findIndex(c => c.id === chapterId);
            document.getElementById('btn-prev').style.visibility = index === 0 ? 'hidden' : 'visible';
            document.getElementById('btn-next').style.visibility = index === CHAPTERS_CONFIG.length - 1 ? 'hidden' : 'visible';

            document.getElementById('chapter-content').innerHTML = '<p style="text-align:center; padding: 40px 0;">Загрузка текста главы из облака...</p>';
            window.scrollTo(0, 0);

            const chapter = CHAPTERS_CONFIG[index];
            
            if (!chapter.url) {
                document.getElementById('chapter-content').innerHTML = '<p style="text-align:center; padding: 40px 0; color: red;">Ошибка: ссылка для этой главы еще не загружена. Попробуйте обновить страницу.</p>';
                return;
            }

            try {
                const rawHtml = await fetchWithFallback(chapter.url);
                const parser = new DOMParser();
                const doc = parser.parseFromString(rawHtml, 'text/html');
                
                // Удаляем встроенные стили Google Docs
                doc.querySelectorAll('style').forEach(s => s.remove());

                // Пытаемся извлечь только полезный контент (без гугловских хедеров и футеров)
                const contentsDiv = doc.querySelector('#contents');
                let cleanContent = '';
                if (contentsDiv) {
                    cleanContent = contentsDiv.innerHTML;
                } else {
                    // Резервный вариант, если структура изменится
                    doc.querySelectorAll('#footer, #header').forEach(el => el.remove());
                    cleanContent = doc.querySelector('body').innerHTML;
                }
                
                document.getElementById('chapter-content').innerHTML = cleanContent;

                const savedScroll = localStorage.getItem(`scroll_pos_${currentChapterId}`);
                if (savedScroll) {
                    setTimeout(() => {
                        window.scrollTo({ top: parseInt(savedScroll), behavior: 'smooth' });
                    }, 150);
                }

            } catch (err) {
                document.getElementById('chapter-content').innerHTML = `
                    <div style="text-align:center; padding: 40px 20px; color: red;">
                        <p><strong>Не удалось загрузить главу.</strong></p>
                        <p style="font-size:14px; color:inherit;">Проверьте подключение к сети или попробуйте перезагрузить страницу.</p>
                    </div>`;
                console.error(err);
            }
        }

        async function fetchWithFallback(targetUrl) {
            const proxies = [
                `https://corsproxy.io/?${encodeURIComponent(targetUrl)}`,
                `https://api.allorigins.win/raw?url=${encodeURIComponent(targetUrl)}`
            ];
            for (const proxy of proxies) {
                try {
                    const res = await fetch(proxy);
                    if (res.ok) return await res.text();
                } catch (e) {
                    console.warn('Сервер обхода CORS вернул ошибку, пробуем следующий...', e);
                }
            }
            throw new Error('Все прокси-серверы недоступны.');
        }

        function goHome() {
            if (currentChapterId) {
                localStorage.setItem(`scroll_pos_${currentChapterId}`, window.scrollY);
            }
            currentChapterId = null;
            document.getElementById('reading-screen').classList.remove('active');
            document.getElementById('home-screen').classList.add('active');
            document.getElementById('btn-to-index').style.display = 'none';
            renderTableOfContents();
            checkContinueReading();
            window.scrollTo(0, 0);
            syncStatsWithWebhook();
        }

        function nextChapter() {
            const index = CHAPTERS_CONFIG.findIndex(c => c.id === currentChapterId);
            if (index < CHAPTERS_CONFIG.length - 1) {
                localStorage.setItem(`scroll_pos_${currentChapterId}`, window.scrollY);
                openChapter(CHAPTERS_CONFIG[index + 1].id);
            }
        }

        function prevChapter() {
            const index = CHAPTERS_CONFIG.findIndex(c => c.id === currentChapterId);
            if (index > 0) {
                localStorage.setItem(`scroll_pos_${currentChapterId}`, window.scrollY);
                openChapter(CHAPTERS_CONFIG[index - 1].id);
            }
        }

        // ================= НАСТРОЙКИ ЧТЕНИЯ =================
        function changeFontSize(delta) {
            const content = document.getElementById('chapter-content');
            let currentSize = parseInt(window.getComputedStyle(content).fontSize);
            let newSize = currentSize + delta;
            if (newSize >= 14 && newSize <= 30) {
                content.style.fontSize = newSize + 'px';
                localStorage.setItem('cravings_font_size', newSize);
            }
        }

        function setTheme(theme) {
            document.body.className = '';
            document.body.classList.add('theme-' + theme);
            localStorage.setItem('cravings_theme', theme);
        }

        // Анимация автоматического скрытия верхней панели
        function initAutoHideNavbar() {
            const topBar = document.getElementById('navigation-top-bar');
            window.addEventListener('scroll', () => {
                if (!topBar) return;
                const currentScrollY = window.scrollY;
                
                if (currentScrollY < 50) {
                    // В самом верху страницы — всегда показываем
                    topBar.style.transform = 'translateY(0)';
                } else if (currentScrollY > lastScrollY) {
                    // Листаем вниз — скрываем панель
                    topBar.style.transform = 'translateY(-100%)';
                } else {
                    // Листаем вверх — показываем панель
                    topBar.style.transform = 'translateY(0)';
                }
                lastScrollY = currentScrollY;
            });
        }

        // ================= СБОР АНАЛИТИКИ И СИНХРОНИЗАЦИЯ =================
        function startActiveTimeTracker() {
            document.addEventListener('visibilitychange', () => {
                isTabFocused = !document.hidden;
            });
            window.addEventListener('focus', () => { isTabFocused = true; });
            window.addEventListener('blur', () => { isTabFocused = false; });

            globalReadingTimeInterval = setInterval(() => {
                if (isTabFocused) {
                    trackingStats.totalActiveSeconds++;
                    
                    if (currentChapterId) {
                        if (!trackingStats.chapters[currentChapterId]) {
                            trackingStats.chapters[currentChapterId] = { timeSeconds: 0, completed: false, lastReadDate: "" };
                        }
                        trackingStats.chapters[currentChapterId].timeSeconds++;
                        trackingStats.chapters[currentChapterId].lastReadDate = new Date().toLocaleString('ru-RU');

                        checkScrollPercentage();
                    }
                }
            }, 1000);

            setInterval(saveStatsToStorage, 15000);
        }

        function checkScrollPercentage() {
            if (!currentChapterId) return;
            const totalScrollableHeight = document.documentElement.scrollHeight - window.innerHeight;
            if (totalScrollableHeight <= 0) return;
            
            const scrolledPercentage = (window.scrollY / totalScrollableHeight) * 100;
            if (scrolledPercentage > 85) {
                if (trackingStats.chapters[currentChapterId]) {
                    trackingStats.chapters[currentChapterId].completed = true;
                }
            }
        }

        function saveStatsToStorage() {
            localStorage.setItem('cravings_stats_v2', JSON.stringify(trackingStats));
        }

        // Автоматическая бесшумная отправка в Google Таблицу
        function syncStatsWithWebhook() {
            if (!AUTO_SYNC_WEBHOOK_URL) return;
            
            const payload = {
                patientId: patientId,
                timestamp: new Date().toISOString(),
                stats: trackingStats,
                currentChapter: currentChapterId ? currentChapterId : "Оглавление"
            };
            
            const dataToSend = JSON.stringify(payload);

            if (navigator.sendBeacon) {
                navigator.sendBeacon(AUTO_SYNC_WEBHOOK_URL, dataToSend);
            } else {
                fetch(AUTO_SYNC_WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain' },
                    body: dataToSend
                }).catch(e => console.warn('Сбой фоновой отправки данных', e));
            }
        }

        window.onbeforeunload = function() {
            if (currentChapterId) {
                localStorage.setItem(`scroll_pos_${currentChapterId}`, window.scrollY);
            }
            saveStatsToStorage();
            syncStatsWithWebhook();
        };

        window.onload = initApp;
    </script>
</body>
</html>
