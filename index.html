<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Терапия принятия и ответственности (ACT)</title>
    <style>
        /* --- Стили интерфейса --- */
        :root {
            --font-sans: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
            --transition-speed: 0.25s;
        }

        body {
            font-family: var(--font-sans);
            margin: 0;
            padding: 0;
            transition: background-color var(--transition-speed), color var(--transition-speed);
            -webkit-font-smoothing: antialiased;
        }

        /* Цветовые темы оформления */
        body.theme-light { background-color: #fcfbf9; color: #202020; }
        body.theme-sepia { background-color: #f4ecd8; color: #5b4636; }
        body.theme-dark  { background-color: #121212; color: #dddddd; }

        .container {
            max-width: 680px;
            margin: 0 auto;
            padding: 20px;
            box-sizing: border-box;
        }

        /* Навигационная панель управления */
        .top-bar {
            position: sticky;
            top: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background-color: inherit;
            border-bottom: 1px solid rgba(128, 128, 128, 0.15);
            backdrop-filter: blur(8px);
            z-index: 1000;
        }

        .btn-group button {
            padding: 6px 12px;
            margin: 0 2px;
            cursor: pointer;
            border: 1px solid rgba(128, 128, 128, 0.3);
            border-radius: 6px;
            background-color: rgba(128, 128, 128, 0.1);
            color: inherit;
            font-size: 14px;
            font-weight: bold;
            transition: opacity 0.2s;
        }
        .btn-group button:hover { opacity: 0.8; }

        /* Экраны */
        .screen { display: none; }
        .screen.active { display: block; }

        /* Оглавление */
        h1 { font-size: 26px; text-align: center; margin-top: 10px; }
        .subtitle { text-align: center; color: gray; margin-bottom: 30px; font-size: 16px;}

        .patient-badge {
            background-color: rgba(0, 128, 0, 0.1);
            border: 1px solid rgba(0, 128, 0, 0.2);
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 25px;
            font-size: 14px;
        }

        .continue-reading-box {
            background-color: rgba(0, 102, 204, 0.1);
            border: 1px solid rgba(0, 102, 204, 0.2);
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 20px;
            display: none;
        }
        .btn-link {
            color: #0066cc;
            text-decoration: underline;
            cursor: pointer;
            font-weight: bold;
            background: none;
            border: none;
            font-size: 15px;
        }

        .chapter-list {
            list-style: none;
            padding: 0;
            margin: 0 0 40px 0;
        }
        .chapter-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 10px;
            border-bottom: 1px solid rgba(128, 128, 128, 0.15);
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .chapter-item:hover { background-color: rgba(128, 128, 128, 0.05); }
        .chapter-info { display: flex; align-items: center; gap: 15px; }
        .chapter-num {
            font-weight: bold;
            min-width: 24px;
            height: 24px;
            background: rgba(128, 128, 128, 0.15);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
        }
        .chapter-title { font-size: 17px; line-height: 1.3; }
        .chapter-status { font-size: 14px; }
        .status-completed { color: #2ecc71; font-weight: bold; }
        .status-reading { color: #3498db; font-style: italic; }

        /* Кнопка отчета */
        .stats-box {
            text-align: center;
            padding: 20px;
            border-top: 1px dashed rgba(128, 128, 128, 0.3);
        }
        .btn-action {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.2s;
        }
        .btn-action:hover { background-color: #2980b9; }
        .alert-success { color: #2ecc71; margin-top: 10px; display: none; font-size: 14px; }

        /* Экран чтения */
        .reader-nav {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        .btn-nav {
            background: none;
            border: 1px solid rgba(128, 128, 128, 0.3);
            color: inherit;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        /* --- Стилизация контента, скачанного из Google Docs --- */
        #chapter-content {
            font-size: inherit;
            line-height: 1.6;
        }
        #chapter-content * {
            background-color: transparent !important;
            color: inherit !important;
            font-family: inherit !important;
        }
        #chapter-content img {
            max-width: 100% !important;
            height: auto !important;
            display: block;
            margin: 24px auto;
            border-radius: 8px;
        }
        #chapter-content p {
            margin-bottom: 1.5em;
            text-align: justify;
        }

        /* Подвал чтения */
        .reader-footer {
            display: flex;
            justify-content: space-between;
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid rgba(128, 128, 128, 0.2);
        }
    </style>
</head>
<body class="theme-light">

    <!-- Верхняя панель управления настройками чтения -->
    <div class="top-bar">
        <div>
            <!-- Кнопка перехода к списку доступна только на экране чтения -->
            <button id="btn-to-index" class="btn-nav" style="display:none;" onclick="goHome()">🏠 Оглавление</button>
        </div>
        <div>
            <span class="btn-group">
                <button onclick="changeFontSize(-1)">А-</button>
                <button onclick="changeFontSize(1)">А+</button>
            </span>
            <span class="btn-group" style="margin-left: 10px;">
                <button onclick="setTheme('light')">День</button>
                <button onclick="setTheme('sepia')">Сепия</button>
                <button onclick="setTheme('dark')">Ночь</button>
            </span>
        </div>
    </div>

    <div class="container">

        <!-- ================= ЭКРАН 1: ОГЛАВЛЕНИЕ ================= -->
        <div id="home-screen" class="screen active">
            <h1>Терапия принятием и ответственностью</h1>
            <p class="subtitle">Практическое руководство по работе с тягой и зависимостями</p>

            <div class="patient-badge" id="patient-badge">
                Пациент: <strong id="patient-id-display">Загрузка...</strong>
            </div>

            <!-- Блок быстрого возврата к чтению -->
            <div class="continue-reading-box" id="continue-box">
                Вы остановились на: <button class="btn-link" onclick="resumeReading()"><span id="continue-chapter-title">...</span></button>
            </div>

            <!-- Список глав -->
            <ul class="chapter-list" id="chapters-ul">
                <!-- Генерируется автоматически через JS -->
            </ul>

            <!-- Блок статистики и отправки отчета -->
            <div class="stats-box">
                <p style="margin-bottom: 15px; font-size: 14px; opacity: 0.8;">
                    Вы можете скопировать данные вашего прогресса и отправить их вашему терапевту.
                </p>
                <button class="btn-action" onclick="copyReportToClipboard()">📋 Копировать отчет для врача</button>
                <div class="alert-success" id="copy-success-alert">Отчет успешно скопирован в буфер обмена!</div>
            </div>
        </div>

        <!-- ================= ЭКРАН 2: ЧТЕНИЕ ГЛАВЫ ================= -->
        <div id="reading-screen" class="screen">
            <div id="chapter-content" style="font-size: 18px;">
                <!-- Сюда динамически подгружается текст из Google Docs -->
            </div>

            <!-- Переключатели внизу главы -->
            <div class="reader-footer">
                <button id="btn-prev" class="btn-nav" onclick="prevChapter()">← Назад</button>
                <button id="btn-next" class="btn-nav" onclick="nextChapter()">Вперед →</button>
            </div>
        </div>

    </div>

    <script>
        // ================= НАСТРОЙКА КНИГИ (Замените демонстрационные ссылки на ваши реальные опубликованные адреса) =================
        const CHAPTERS_CONFIG = [
            { id: 'chapter1',  num: 1,  title: 'Природа тяги и распространенные мифы о ней', url: 'https://docs.google.com/document/d/e/2PACX-1vS59tQ_g0gsc1ZgE-z9M7Wf_0FpG_hXN00YyS_p_R_K_Example1/pub' },
            { id: 'chapter2',  num: 2,  title: 'За и против: почему мы выбираем зависимость', url: 'https://docs.google.com/document/d/e/2PACX-1vS59tQ_g0gsc1ZgE-z9M7Wf_0FpG_hXN00YyS_p_R_K_Example2/pub' },
            { id: 'chapter3',  num: 3,  title: 'Роль ценностей в преодолении привычек',     url: 'https://docs.google.com/document/d/e/2PACX-1vS59tQ_g0gsc1ZgE-z9M7Wf_0FpG_hXN00YyS_p_R_K_Example3/pub' },
            { id: 'chapter4',  num: 4,  title: 'Почему жесткий контроль над тягой не работает', url: 'https://docs.google.com/document/d/e/2PACX-1vS59tQ_g0gsc1ZgE-z9M7Wf_0FpG_hXN00YyS_p_R_K_Example4/pub' },
            { id: 'chapter5',  num: 5,  title: 'Готовность принять и прожить тягу',         url: 'https://docs.google.com/document/d/e/2PACX-1v_Demo_Link_5/pub' },
            { id: 'chapter6',  num: 6,  title: 'Когнитивное разделение: шаг назад от мыслей', url: 'https://docs.google.com/document/d/e/2PACX-1v_Demo_Link_6/pub' },
            { id: 'chapter7',  num: 7,  title: 'Наблюдающее «Я»: вы больше своих историй',   url: 'https://docs.google.com/document/d/e/2PACX-1v_Demo_Link_7/pub' },
            { id: 'chapter8',  num: 8,  title: 'Осознанность и укрощение ума',              url: 'https://docs.google.com/document/d/e/2PACX-1v_Demo_Link_8/pub' },
            { id: 'chapter9',  num: 9,  title: 'Самосострадание против стыда и самокритики', url: 'https://docs.google.com/document/d/e/2PACX-1v_Demo_Link_9/pub' },
            { id: 'chapter10', num: 10, title: 'Наполнение жизни последовательными действиями', url: 'https://docs.google.com/document/d/e/2PACX-1v_Demo_Link_10/pub' },
            { id: 'chapter11', num: 11, title: 'Как справляться с промахами и рецидивами',   url: 'https://docs.google.com/document/d/e/2PACX-1v_Demo_Link_11/pub' },
            { id: 'chapter12', num: 12, title: 'Как выстроить надежную систему поддержки',   url: 'https://docs.google.com/document/d/e/2PACX-1v_Demo_Link_12/pub' },
            { id: 'chapter13', num: 13, title: 'Ваша новая история и долгосрочный успех',     url: 'https://docs.google.com/document/d/e/2PACX-1v_Demo_Link_13/pub' }
        ];

        // Интегрированный адрес Google Apps Script вебхука для авто-отправки данных в таблицу
        const AUTO_SYNC_WEBHOOK_URL = 'https://script.google.com/macros/s/AKfycbxNUthMuBoOGOvVLqRODy58_9HCSm7XBdtRGfYi41sguxx_ZbGWb0w7i16MkEXt5AWN/exec'; 

        // ================= СИСТЕМНЫЙ КОД ПРИЛОЖЕНИЯ =================
        let patientId = 'Анонимный читатель';
        let currentChapterId = null;
        let isTabFocused = true;
        let globalReadingTimeInterval = null;

        // Инициализация структуры собираемой статистики
        let trackingStats = {
            totalActiveSeconds: 0,
            lastVisit: new Date().toLocaleDateString('ru-RU'),
            chapters: {} // ID_главы: { timeSeconds: 0, completed: false, lastReadDate: "" }
        };

        // Запуск и настройка приложения при старте
        function initApp() {
            // 1. Определение ID Пациента из ссылки (?p=Иванов или ?id=Иванов)
            const params = new URLSearchParams(window.location.search);
            const pCode = params.get('p') || params.get('id');
            if (pCode) {
                localStorage.setItem('cravings_p_id', pCode);
                // Очищаем адресную строку браузера для эстетичного вида
                window.history.replaceState({}, document.title, window.location.pathname);
            }
            patientId = localStorage.getItem('cravings_p_id') || 'Анонимный читатель';
            document.getElementById('patient-id-display').innerText = patientId;

            // 2. Настройка сохраненной темы оформления и размера шрифта
            const savedTheme = localStorage.getItem('cravings_theme') || 'light';
            setTheme(savedTheme);
            const savedFontSize = localStorage.getItem('cravings_font_size') || '18';
            document.getElementById('chapter-content').style.fontSize = savedFontSize + 'px';

            // 3. Загрузка сохраненной статистики из памяти устройства
            const savedStats = localStorage.getItem('cravings_stats_v2');
            if (savedStats) {
                trackingStats = JSON.parse(savedStats);
            }
            trackingStats.lastVisit = new Date().toLocaleDateString('ru-RU');
            saveStatsToStorage();

            // 4. Отрендерить оглавление
            renderTableOfContents();

            // 5. Проверить точку прерванного чтения
            checkContinueReading();

            // 6. Запуск таймера учета активного чтения
            startActiveTimeTracker();
        }

        // Вывод оглавления книги на главную страницу
        function renderTableOfContents() {
            const ul = document.getElementById('chapters-ul');
            ul.innerHTML = '';
            
            CHAPTERS_CONFIG.forEach(ch => {
                const li = document.createElement('li');
                li.className = 'chapter-item';
                li.onclick = () => openChapter(ch.id);

                const infoDiv = document.createElement('div');
                infoDiv.className = 'chapter-info';

                const numSpan = document.createElement('span');
                numSpan.className = 'chapter-num';
                numSpan.innerText = ch.num;

                const titleSpan = document.createElement('span');
                titleSpan.className = 'chapter-title';
                titleSpan.innerText = ch.title;

                infoDiv.appendChild(numSpan);
                infoDiv.appendChild(titleSpan);
                li.appendChild(infoDiv);

                // Определение статуса чтения главы
                const statusSpan = document.createElement('span');
                statusSpan.className = 'chapter-status';
                
                const chStats = trackingStats.chapters[ch.id];
                if (chStats && chStats.completed) {
                    statusSpan.innerHTML = '<span class="status-completed">✓ Прочитано</span>';
                } else if (chStats && chStats.timeSeconds > 10) {
                    statusSpan.innerHTML = '<span class="status-reading">В процессе</span>';
                }
                
                li.appendChild(statusSpan);
                ul.appendChild(li);
            });
        }

        // Проверка точки прерванного чтения
        function checkContinueReading() {
            const lastChId = localStorage.getItem('cravings_last_ch_id');
            if (lastChId) {
                const chapter = CHAPTERS_CONFIG.find(c => c.id === lastChId);
                if (chapter) {
                    document.getElementById('continue-box').style.display = 'block';
                    document.getElementById('continue-chapter-title').innerText = `Глава ${chapter.num}. ${chapter.title}`;
                }
            } else {
                document.getElementById('continue-box').style.display = 'none';
            }
        }

        function resumeReading() {
            const lastChId = localStorage.getItem('cravings_last_ch_id');
            if (lastChId) openChapter(lastChId);
        }

        // ================= ОТКРЫТИЕ И ИНТЕРАКТИВНОЕ ЧТЕНИЕ ГЛАВЫ =================
        async function openChapter(chapterId) {
            currentChapterId = chapterId;
            localStorage.setItem('cravings_last_ch_id', chapterId);
            
            // Переключаем экраны: скрываем оглавление, выводим экран чтения
            document.getElementById('home-screen').classList.remove('active');
            document.getElementById('reading-screen').classList.add('active');
            document.getElementById('btn-to-index').style.display = 'block';

            // Настройка кнопок навигации назад/вперед внизу главы
            const index = CHAPTERS_CONFIG.findIndex(c => c.id === chapterId);
            document.getElementById('btn-prev').style.visibility = index === 0 ? 'hidden' : 'visible';
            document.getElementById('btn-next').style.visibility = index === CHAPTERS_CONFIG.length - 1 ? 'hidden' : 'visible';

            document.getElementById('chapter-content').innerHTML = '<p style="text-align:center; padding: 40px 0;">Загрузка текста главы из облака...</p>';
            window.scrollTo(0, 0);

            const chapter = CHAPTERS_CONFIG[index];
            try {
                const rawHtml = await fetchWithFallback(chapter.url);
                const parser = new DOMParser();
                const doc = parser.parseFromString(rawHtml, 'text/html');
                
                // Очищаем контент от встроенных стилей оформления Google Документов
                doc.querySelectorAll('style').forEach(s => s.remove());
                const cleanContent = doc.querySelector('body').innerHTML;
                
                document.getElementById('chapter-content').innerHTML = cleanContent;

                // Восстановление позиции прокрутки для этой главы, если пациент её ранее открывал
                const savedScroll = localStorage.getItem(`scroll_pos_${currentChapterId}`);
                if (savedScroll) {
                    setTimeout(() => {
                        window.scrollTo({ top: parseInt(savedScroll), behavior: 'smooth' });
                    }, 150);
                }

            } catch (err) {
                document.getElementById('chapter-content').innerHTML = `
                    <div style="text-align:center; padding: 40px 20px; color: red;">
                        <p><strong>Не удалось загрузить главу.</strong></p>
                        <p style="font-size:14px; color:inherit;">Проверьте интернет-соединение или попробуйте перезагрузить страницу.</p>
                    </div>`;
                console.error(err);
            }
        }

        // Обход ограничений CORS с использованием резервных прокси-серверов
        async function fetchWithFallback(targetUrl) {
            const proxies = [
                `https://corsproxy.io/?${encodeURIComponent(targetUrl)}`,
                `https://api.allorigins.win/raw?url=${encodeURIComponent(targetUrl)}`
            ];
            for (const proxy of proxies) {
                try {
                    const res = await fetch(proxy);
                    if (res.ok) return await res.text();
                } catch (e) {
                    console.warn('Прокси-сервер временно недоступен, пробуем следующий...', e);
                }
            }
            throw new Error('Все прокси-серверы вернули ошибку.');
        }

        function goHome() {
            // Сохраняем текущее положение прокрутки перед возвратом в меню
            if (currentChapterId) {
                localStorage.setItem(`scroll_pos_${currentChapterId}`, window.scrollY);
            }
            currentChapterId = null;
            document.getElementById('reading-screen').classList.remove('active');
            document.getElementById('home-screen').classList.add('active');
            document.getElementById('btn-to-index').style.display = 'none';
            renderTableOfContents();
            checkContinueReading();
            window.scrollTo(0, 0);
            syncStatsWithWebhook();
        }

        function nextChapter() {
            const index = CHAPTERS_CONFIG.findIndex(c => c.id === currentChapterId);
            if (index < CHAPTERS_CONFIG.length - 1) {
                localStorage.setItem(`scroll_pos_${currentChapterId}`, window.scrollY);
                openChapter(CHAPTERS_CONFIG[index + 1].id);
            }
        }

        function prevChapter() {
            const index = CHAPTERS_CONFIG.findIndex(c => c.id === currentChapterId);
            if (index > 0) {
                localStorage.setItem(`scroll_pos_${currentChapterId}`, window.scrollY);
                openChapter(CHAPTERS_CONFIG[index - 1].id);
            }
        }

        // ================= НАСТРОЙКИ ЧТЕНИЯ (ШРИФТ И ТЕМЫ) =================
        function changeFontSize(delta) {
            const content = document.getElementById('chapter-content');
            let currentSize = parseInt(window.getComputedStyle(content).fontSize);
            let newSize = currentSize + delta;
            if (newSize >= 14 && newSize <= 30) {
                content.style.fontSize = newSize + 'px';
                localStorage.setItem('cravings_font_size', newSize);
            }
        }

        function setTheme(theme) {
            document.body.className = '';
            document.body.classList.add('theme-' + theme);
            localStorage.setItem('cravings_theme', theme);
        }

        // ================= УЧЕТ АКТИВНОГО ВРЕМЕНИ И СТАТИСТИКИ =================
        function startActiveTimeTracker() {
            // Анализ активности вкладки браузера
            document.addEventListener('visibilitychange', () => {
                isTabFocused = !document.hidden;
            });
            window.addEventListener('focus', () => { isTabFocused = true; });
            window.addEventListener('blur', () => { isTabFocused = false; });

            // Каждую секунду начисляем время, если вкладка активна
            globalReadingTimeInterval = setInterval(() => {
                if (isTabFocused) {
                    trackingStats.totalActiveSeconds++;
                    
                    if (currentChapterId) {
                        if (!trackingStats.chapters[currentChapterId]) {
                            trackingStats.chapters[currentChapterId] = { timeSeconds: 0, completed: false, lastReadDate: "" };
                        }
                        trackingStats.chapters[currentChapterId].timeSeconds++;
                        trackingStats.chapters[currentChapterId].lastReadDate = new Date().toLocaleString('ru-RU');

                        // Автоматически помечаем прочитанным при прокрутке страницы ниже 85%
                        checkScrollPercentage();
                    }
                }
            }, 1000);

            // Регулярное резервное копирование во внутреннюю память раз в 15 секунд
            setInterval(saveStatsToStorage, 15000);
        }

        function checkScrollPercentage() {
            if (!currentChapterId) return;
            const totalScrollableHeight = document.documentElement.scrollHeight - window.innerHeight;
            if (totalScrollableHeight <= 0) return;
            
            const scrolledPercentage = (window.scrollY / totalScrollableHeight) * 100;
            if (scrolledPercentage > 85) {
                if (trackingStats.chapters[currentChapterId]) {
                    trackingStats.chapters[currentChapterId].completed = true;
                }
            }
        }

        function saveStatsToStorage() {
            localStorage.setItem('cravings_stats_v2', JSON.stringify(trackingStats));
        }

        // Конвертация секунд в минуты для наглядности отчета
        function formatTime(seconds) {
            const m = Math.floor(seconds / 60);
            if (m === 0 && seconds > 0) return 'меньше минуты';
            return `${m} мин.`;
        }

        // Генерация структурированного отчета в буфер обмена
        function generateReportText() {
            saveStatsToStorage();
            let completedCount = 0;
            let chaptersText = '';

            CHAPTERS_CONFIG.forEach(ch => {
                const chStats = trackingStats.chapters[ch.id];
                if (chStats) {
                    const status = chStats.completed ? 'Прочитано' : 'В процессе';
                    if (chStats.completed) completedCount++;
                    chaptersText += `\n- Глава ${ch.num}: ${status} (Время: ${formatTime(chStats.timeSeconds)}, Дата: ${chStats.lastReadDate || 'нет'})`;
                }
            });

            const currentActiveCh = currentChapterId ? CHAPTERS_CONFIG.find(c => c.id === currentChapterId) : null;
            const currentText = currentActiveCh ? `Глава ${currentActiveCh.num}. ${currentActiveCh.title}` : 'Оглавление (не читает)';

            return `ОТЧЕТ О ПРОГРЕССЕ ЧТЕНИЯ:
ID Пациента: ${patientId}
Дата отчета: ${new Date().toLocaleString('ru-RU')}
Последний визит: ${trackingStats.lastVisit}
Общее активное время чтения: ${formatTime(trackingStats.totalActiveSeconds)}
Прочитано глав: ${completedCount} из ${CHAPTERS_CONFIG.length}
Сейчас читает: ${currentText}
----------------------------------------
Детализация по главам:${chaptersText || '\nПока нет данных о чтении глав.'}
----------------------------------------
Создано в системе управления тягой на основе ACT.`;
        }

        function copyReportToClipboard() {
            const reportText = generateReportText();
            navigator.clipboard.writeText(reportText).then(() => {
                const alert = document.getElementById('copy-success-alert');
                alert.style.display = 'block';
                setTimeout(() => {
                    alert.style.display = 'none';
                }, 4000);
            }).catch(err => {
                alert('Не удалось скопировать отчет автоматически. Выделите и скопируйте текст вручную.');
                console.error(err);
            });
            syncStatsWithWebhook();
        }

        // Фоновая автоматическая отправка данных в Google Таблицу (через Apps Script)
        function syncStatsWithWebhook() {
            if (!AUTO_SYNC_WEBHOOK_URL) return;
            
            const payload = {
                patientId: patientId,
                timestamp: new Date().toISOString(),
                stats: trackingStats,
                currentChapter: currentChapterId ? currentChapterId : "Оглавление"
            };
            
            const dataToSend = JSON.stringify(payload);

            // sendBeacon гарантирует доставку данных даже при мгновенном закрытии вкладки
            if (navigator.sendBeacon) {
                navigator.sendBeacon(AUTO_SYNC_WEBHOOK_URL, dataToSend);
            } else {
                // Резервный fetch с типом text/plain для обхода ограничений CORS в Google Apps Script
                fetch(AUTO_SYNC_WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain' },
                    body: dataToSend
                }).catch(e => console.warn('Не удалось отправить статистику автоматически', e));
            }
        }

        // Сохранять прогресс прокрутки и отправлять вебхук при уходе со страницы
        window.onbeforeunload = function() {
            if (currentChapterId) {
                localStorage.setItem(`scroll_pos_${currentChapterId}`, window.scrollY);
            }
            saveStatsToStorage();
            syncStatsWithWebhook();
        };

        // Запуск приложения
        window.onload = initApp;
    </script>
</body>
